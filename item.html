<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ledger — Item Auction Tracker</title>
<style>
  :root{
    --bg:#0b0e12; --panel:#12161c; --border:#232a33; --text:#d3d9e0;
    --dim:#7a8592; --accent:#4fae74; --bad:#d0685f; --hi:#c9a24b;
  }
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--text);margin:0;font-size:13px;font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif}
  td,.num,.stat-value{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
  header{display:flex;align-items:baseline;gap:14px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--panel)}
  header h1{font-size:15px;margin:0;letter-spacing:.06em;color:var(--text);font-weight:700}
  header h1 a{color:inherit;text-decoration:none}
  header .sub{color:var(--dim);font-size:12px}
  header nav{margin-left:auto;display:flex;gap:16px}
  header nav a{color:var(--dim);font-size:12.5px;text-decoration:none}
  header nav a:hover{color:var(--text)}
  main{padding:20px;max-width:1100px;margin:0 auto}
  .search-row{display:flex;gap:10px;margin-bottom:20px}
  input[type=text]{background:var(--panel);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:4px;font:inherit;flex:1}
  button.action{background:var(--accent);color:#06150c;border:none;padding:8px 18px;border-radius:4px;cursor:pointer;font:inherit;font-weight:600}
  button.action:disabled{opacity:.5;cursor:default}
  .item-head{display:flex;align-items:baseline;gap:12px;margin-bottom:4px}
  .item-head h2{margin:0;font-size:22px}
  .item-id{color:var(--dim);font-size:12px}
  .stat-row{display:flex;gap:32px;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat-value{font-size:20px;font-weight:700}
  .stat-label{font-size:11px;color:var(--dim)}
  h3.subhead{font-size:12px;text-transform:uppercase;letter-spacing:.03em;color:var(--dim);margin:26px 0 10px}
  .section-note{color:var(--dim);font-size:12px;margin:0 0 12px}
  table{width:100%;border-collapse:collapse}
  th,td{padding:7px 10px;text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th{color:var(--dim);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:var(--panel)}
  .gain{color:var(--accent)}
  .loss{color:var(--bad)}
  .flag{color:var(--accent);font-size:11px;border:1px solid var(--accent);border-radius:3px;padding:1px 5px;margin-left:6px}
  #chart{width:100%;height:200px;display:block;background:var(--panel);border-radius:6px;margin-bottom:20px}
  .empty-state{color:var(--dim);font-size:12px;padding:20px 0}
  #modal{position:fixed;inset:0}
  #modal:not([hidden]){background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center}
  #modal .box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;max-width:480px;width:90%;max-height:80vh;overflow:auto}
  #modal-close{float:right;background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px}
  .tooltip{font-family:"Consolas","SF Mono",monospace;font-size:13px;line-height:1.6;background:#000;border-radius:6px;padding:14px}
  .tooltip-meta{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);color:var(--dim);font-size:12px;font-family:-apple-system,sans-serif}
  .tooltip-meta a{color:var(--accent)}
  footer{text-align:center;color:var(--dim);font-size:11px;padding:30px 20px}
  footer a{color:var(--dim)}
</style>
</head>
<body>

<header>
  <h1><a href="index.html">LEDGER</a></h1>
  <span class="sub">Item Auction Tracker</span>
  <nav>
    <a href="ledger.html">Market Terminal</a>
    <a href="index.html">Home</a>
  </nav>
</header>

<main>
  <div class="search-row">
    <input type="text" id="item-search" placeholder="Item id or name, e.g. HYPERION">
    <button class="action" id="go-btn">Look up</button>
  </div>

  <div id="content" class="empty-state">Enter an item id above, or open this page as item.html?id=HYPERION.</div>
</main>

<div id="modal" hidden>
  <div class="box">
    <button id="modal-close">×</button>
    <div class="modal-body"></div>
  </div>
</div>

<footer>
  Ledger is an independent project and is not affiliated with Hypixel Inc. · <a href="privacy.html">Privacy Policy</a> · <a href="https://github.com/gamingPinguin/HypixelApiLookup" target="_blank" rel="noopener">GitHub</a>
</footer>

<script src="ledger-core.js"></script>
<script>
'use strict';

let currentId = null;
let currentListings = []; // decoded live listings for the current item
let currentGroups = new Map(); // fingerprint -> listings[]

function paramId() {
  return new URLSearchParams(location.search).get('id');
}

document.getElementById('go-btn').addEventListener('click', () => {
  const v = document.getElementById('item-search').value.trim().toUpperCase().replace(/\s+/g, '_');
  if (v) location.href = 'item.html?id=' + encodeURIComponent(v);
});
document.getElementById('item-search').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('go-btn').click();
});
document.getElementById('modal-close').addEventListener('click', () => { document.getElementById('modal').hidden = true; });
document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') e.currentTarget.hidden = true; });

async function init() {
  const id = paramId();
  if (!id) return;
  currentId = id;
  document.getElementById('item-search').value = niceName(id);
  render();
  loadRecentActivity();
  loadHistory();
}

function render() {
  document.getElementById('content').innerHTML = `
    <div class="item-head"><h2 id="item-name">${niceName(currentId)}</h2><span class="item-id">${currentId}</span></div>
    <div class="stat-row">
      <div class="stat"><span class="stat-value" id="stat-lowest">-</span><span class="stat-label">Lowest BIN</span></div>
      <div class="stat"><span class="stat-value" id="stat-listings">-</span><span class="stat-label">Live listings</span></div>
      <div class="stat"><span class="stat-value" id="stat-variants">-</span><span class="stat-label">Attribute variants</span></div>
      <div class="stat"><span class="stat-value" id="stat-flagged">-</span><span class="stat-label">Flagged underpriced</span></div>
    </div>

    <h3 class="subhead">Price history</h3>
    <p class="section-note">From the backend's recorded sales for this item's most common variant. Empty if no backend is connected or it hasn't recorded a sale yet.</p>
    <canvas id="chart" width="1000" height="200"></canvas>

    <h3 class="subhead">Recent activity</h3>
    <p class="section-note">Auctions that ended in roughly the last hour, from Hypixel's live ended-auctions feed.</p>
    <table id="recent-table">
      <thead><tr><th>When</th><th>Price</th><th>Variant</th><th>Seller</th></tr></thead>
      <tbody></tbody>
    </table>
    <div class="empty-state" id="recent-empty">Loading...</div>

    <h3 class="subhead">Attribute variants</h3>
    <p class="section-note">Live listings grouped by the same attributes that decide resale value — stars, recombobulation, enchants — so you're comparing like with like.</p>
    <table id="variants-table">
      <thead><tr><th>Variant</th><th>Listings</th><th>Cheapest</th><th>Median</th></tr></thead>
      <tbody></tbody>
    </table>

    <h3 class="subhead">Live listings</h3>
    <p class="section-note">Every active Buy It Now listing for this item. Flagged rows sit well below the median for their variant. Click a row to preview the item.</p>
    <div class="search-row">
      <button class="action" id="scan-btn">Scan live listings</button>
      <span class="section-note" id="scan-status" style="margin:0"></span>
    </div>
    <table id="listings-table">
      <thead><tr><th>Price</th><th>Variant</th><th>Seller</th></tr></thead>
      <tbody></tbody>
    </table>
  `;
  document.getElementById('scan-btn').addEventListener('click', scanListings);
}

// ---------- recent activity (auctions_ended, fast, no scan needed) ----------
async function loadRecentActivity() {
  const tbody = document.querySelector('#recent-table tbody');
  const empty = document.getElementById('recent-empty');
  try {
    const data = await (await fetch(AUCTIONS_ENDED_URL)).json();
    const rows = [];
    for (const a of data.auctions) {
      let items;
      try { items = await decodeItemBytes(a.item_bytes); } catch (e) { continue; }
      const ea = items[0]?.tag?.ExtraAttributes;
      if (ea?.id !== currentId) continue;
      rows.push({ price: a.price, ts: a.timestamp, seller: a.seller, variant: describeFingerprint(currentId, ea) });
    }
    rows.sort((a, b) => b.ts - a.ts);
    empty.textContent = rows.length ? '' : 'No sales for this item in the last hour.';
    tbody.innerHTML = rows.map(r => `
      <tr><td>${timeAgo(r.ts)}</td><td>${fmt(r.price)}</td><td>${r.variant}</td><td>${sellerCell(r.seller)}</td></tr>
    `).join('');
    resolveSellerCells(tbody);
  } catch (e) {
    empty.textContent = 'Could not reach the Hypixel API.';
  }
}

// ---------- price history (backend) ----------
async function loadHistory() {
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  try {
    const rows = await (await fetch(`/api/history?fingerprint=${encodeURIComponent(currentId)}`)).json();
    if (!rows.length) { drawEmptyChart(ctx, canvas, 'No recorded sales yet.'); return; }
    drawChart(ctx, canvas, rows.slice().reverse());
  } catch (e) {
    drawEmptyChart(ctx, canvas, 'Backend not reachable — run docker compose up in backend/ to see this.');
  }
}
function drawEmptyChart(ctx, canvas, msg) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#7a8592';
  ctx.font = '13px -apple-system, sans-serif';
  ctx.fillText(msg, 16, canvas.height / 2);
}
function drawChart(ctx, canvas, rows) {
  const w = canvas.width, h = canvas.height, pad = 30;
  ctx.clearRect(0, 0, w, h);
  const prices = rows.map(r => r.price);
  const min = Math.min(...prices), max = Math.max(...prices) || 1;
  const x = i => pad + (i / Math.max(1, rows.length - 1)) * (w - pad * 2);
  const y = p => h - pad - ((p - min) / (max - min || 1)) * (h - pad * 2);
  ctx.strokeStyle = '#4fae74';
  ctx.lineWidth = 2;
  ctx.beginPath();
  rows.forEach((r, i) => { const px = x(i), py = y(r.price); i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py); });
  ctx.stroke();
  ctx.fillStyle = '#7a8592';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.fillText(fmt(max), 4, y(max) + 4);
  ctx.fillText(fmt(min), 4, y(min) + 4);
}

// ---------- live listings scan ----------
async function scanListings() {
  const btn = document.getElementById('scan-btn');
  const status = document.getElementById('scan-status');
  btn.disabled = true;
  try {
    status.textContent = 'fetching page 0...';
    const first = await (await fetch(AUCTIONS_URL + '?page=0')).json();
    const totalPages = first.totalPages;
    const allBin = first.auctions.filter(a => a.bin);
    const rest = [];
    for (let p = 1; p < totalPages; p++) rest.push(fetch(`${AUCTIONS_URL}?page=${p}`).then(r => r.json()));
    let fetched = 1;
    for (const pr of rest) {
      const data = await pr;
      allBin.push(...data.auctions.filter(a => a.bin));
      fetched++;
      status.textContent = `fetched ${fetched}/${totalPages} pages`;
    }

    status.textContent = `decoding ${allBin.length} listings...`;
    const groups = new Map();
    const listings = [];
    let decoded = 0, idx = 0;
    async function worker() {
      while (idx < allBin.length) {
        const auction = allBin[idx++];
        try {
          const items = await decodeItemBytes(auction.item_bytes);
          const ea = items[0]?.tag?.ExtraAttributes;
          if (ea?.id === currentId) {
            const fp = fingerprint(currentId, ea);
            const listing = {
              price: auction.starting_bid, uuid: auction.uuid, auctioneer: auction.auctioneer,
              variant: describeFingerprint(currentId, ea), fp, display: items[0]?.tag?.display,
            };
            listings.push(listing);
            if (!groups.has(fp)) groups.set(fp, []);
            groups.get(fp).push(listing);
          }
        } catch (e) { /* malformed item_bytes, skip */ }
        decoded++;
        if (decoded % 1000 === 0) status.textContent = `decoded ${decoded}/${allBin.length}`;
      }
    }
    await Promise.all(Array.from({ length: 25 }, worker));

    currentListings = listings;
    currentGroups = groups;
    status.textContent = `${listings.length} live listings found`;
    renderVariants();
    renderListings();
    renderStats();
  } catch (e) {
    console.error(e);
    status.textContent = 'scan failed: ' + e.message;
  }
  btn.disabled = false;
}

function renderStats() {
  const prices = currentListings.map(l => l.price);
  document.getElementById('stat-lowest').textContent = prices.length ? fmt(Math.min(...prices)) : '-';
  document.getElementById('stat-listings').textContent = currentListings.length;
  document.getElementById('stat-variants').textContent = currentGroups.size;
  document.getElementById('stat-flagged').textContent = findSnipes(currentGroups).length;
}

function renderVariants() {
  const rows = [...currentGroups.entries()].map(([fp, listings]) => {
    const prices = listings.map(l => l.price);
    return { variant: listings[0].variant, count: listings.length, cheapest: Math.min(...prices), median: median(prices) };
  }).sort((a, b) => b.count - a.count);
  document.querySelector('#variants-table tbody').innerHTML = rows.map(r => `
    <tr><td>${r.variant}</td><td>${r.count}</td><td>${fmt(r.cheapest)}</td><td>${fmt(r.median)}</td></tr>
  `).join('');
}

function renderListings() {
  const snipedUuids = new Set(findSnipes(currentGroups).map(s => s.cheapest.uuid));
  const rows = [...currentListings].sort((a, b) => a.price - b.price).slice(0, 300);
  const tbody = document.querySelector('#listings-table tbody');
  tbody.innerHTML = rows.map((l, i) => `
    <tr data-i="${i}"><td>${fmt(l.price)}${snipedUuids.has(l.uuid) ? '<span class="flag">underpriced</span>' : ''}</td><td>${l.variant}</td><td>${sellerCell(l.auctioneer)}</td></tr>
  `).join('');
  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => openPreview(rows[+tr.dataset.i]));
  });
  resolveSellerCells(tbody);
}

// ---------- seller cells (resolved via backend if reachable) ----------
function sellerCell(uuid) {
  return `<span class="seller-cell" data-uuid="${uuid}">${uuid.slice(0, 8)}…</span>`;
}
async function resolveSellerCells(container) {
  const uuids = [...new Set([...container.querySelectorAll('.seller-cell')].map(el => el.dataset.uuid))];
  for (const uuid of uuids) {
    try {
      const res = await fetch(`/api/player?uuid=${uuid}`);
      if (!res.ok) continue;
      const data = await res.json();
      if (!data.name) continue;
      container.querySelectorAll(`.seller-cell[data-uuid="${uuid}"]`).forEach(el => { el.textContent = data.name; });
    } catch (e) { /* backend not reachable, keep the short uuid */ }
  }
}

// ---------- item preview (tooltip with name + lore) ----------
function openPreview(listing) {
  const modal = document.getElementById('modal');
  const display = listing.display;
  const body = display
    ? `${mcLineToHtml(display.Name || currentId)}<br><br>${(display.Lore || []).map(mcLineToHtml).join('<br>')}`
    : 'No preview data for this item.';
  modal.querySelector('.modal-body').innerHTML = `
    <div class="tooltip">${body}</div>
    <div class="tooltip-meta">
      Price: ${fmt(listing.price)} · <a href="https://sky.shiiyu.moe/stats/${listing.auctioneer}" target="_blank" rel="noopener">seller profile</a>
    </div>
  `;
  modal.hidden = false;
}

init();
</script>
</body>
</html>
